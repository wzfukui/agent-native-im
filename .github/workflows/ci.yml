name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: chris
          POSTGRES_DB: agent_im_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chris -d agent_im_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://chris@localhost:5432/agent_im_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U chris -d agent_im_test && exit 0
            sleep 1
          done
          exit 1

      - name: Run migrations
        run: |
          for f in $(ls migrations/*_up.sql | sort); do
            echo "Applying $f"
            psql "$TEST_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run tests
        run: go test ./...
